name: Build on MSYS2

on: [ push, pull_request ]

jobs:
  build:
    runs-on: ${{ matrix.runs-on }}

    strategy:
      matrix:
        include:
          - arch: x64
            runs-on: windows-latest
            msystem: mingw64
            install: autotools mingw-w64-x86_64-gcc mingw-w64-x86_64-libogg
            artifact_name: flac-win64-static
            log_suffix: flac

          - arch: arm64
            runs-on: windows-11-arm
            msystem: clangarm64
            install: autotools mingw-w64-clang-aarch64-clang mingw-w64-clang-aarch64-libogg
            artifact_name: flac-winarm64-static
            log_suffix: flac-arm64

    steps:
      - name: Set git to use LF
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: ${{ matrix.install }}

      - name: Install pandoc
        run: |
          choco install pandoc

      - name: Build, run tests and prepare package
        shell: msys2 {0}
        run: |
          PATH=$PATH:/c/ProgramData/chocolatey/bin/:/c/Program\ Files/Git/bin/
          ./autogen.sh
          ./configure --enable-static --disable-shared # This is because the libtool helper script doesn't handle UTF-8 filenames correctly
          make LDFLAGS='-all-static' # Otherwise ogg isn't linked statically
          make check
          mkdir flac
          cp src/flac/flac.exe flac/flac.exe
          cp src/metaflac/metaflac.exe flac/metaflac.exe
          strip flac/*.exe
          cp COPYING.* flac
          cp AUTHORS flac
          cp README* flac
          cp man/*.html flac

      - name: Upload logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ${{ matrix.log_suffix }}-${{ github.sha }}-${{ github.run_id }}-logs
          path: |
            ./**/*.log
            ./**/out*.meta

      - name: Package build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.sha }}
          path: flac